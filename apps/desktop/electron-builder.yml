# Local/dev packaging config. Release packaging (dmg, notarization,
# auto-update) hardens in W11; this exists so `pnpm ship:local` can put a
# runnable "Bobble.app" in /Applications at any time.
appId: app.pidesktop.desktop
productName: Bobble
directories:
  output: release
# `files` selects the app's OWN sources (the renderer bundle + the CJS electron
# bundle). electron-builder ALSO copies the production dependency tree from
# package.json into the asar automatically — that is how the runtime-loaded
# workspace packages get bundled without appearing in any import graph:
#   - @pi-desktop/provider-llamacpp, @pi-desktop/harness, @pi-desktop/web-tools
#     ride along as `dependencies` (apps/desktop/package.json) purely so they
#     land at <asar>/node_modules/@pi-desktop/<pkg>/src/index.ts, where pi loads
#     them via `-e` (see electron/pi/pi-main.ts + electron/app-paths.ts). The
#     desktop app never imports them; the dependency entry IS the bundling
#     mechanism.
#   - @pi-desktop/canvas carries its harness/ dir, served over pd-preview://.
# Their .ts entry points + transitive deps stay INSIDE the asar on purpose: the
# ELECTRON_RUN_AS_NODE pi child has the asar fs shim, and Node module resolution
# only stays coherent when the whole tree shares the asar path (see app-paths.ts).
files:
  - dist/**/*
  - dist-electron/**/*
  # Mac computer-use cursor overlay: static page loaded via loadFile from the
  # app root (electron/mac/overlay-window.ts overlayHtmlPath).
  - electron/mac/overlay.html
# Bundled skills (SKILL.md playbooks + their LICENSE/attribution) ship OUTSIDE
# the asar at <Resources>/skills so the main process can cpSync a chosen folder
# into ~/.pi/agent/skills/<id> (skills-main.ts resolves process.resourcesPath).
extraResources:
  - from: resources/skills
    to: skills
    filter: ['**/*']
asarUnpack:
  # pi is spawned as a real child process (ELECTRON_RUN_AS_NODE). Its cli.js is
  # read through the asar shim, but its native transitive dep koffi (loaded via
  # @mariozechner/clipboard) is a .node binary that CANNOT load from inside the
  # asar, so the whole @mariozechner tree is unpacked. (electron-builder also
  # auto-unpacks stray .node files, but pinning the scope here is explicit and
  # keeps cli.js + its native deps colocated on real disk.)
  - node_modules/@mariozechner/**
  # node-pty (terminal tabs, Phase 2b) is a native .node addon that cannot load
  # from inside the asar — unpack it so require('node-pty') resolves in the
  # packaged app. Absent when the optional dep / native rebuild was skipped, in
  # which case the PTY manager degrades to its piped-shell fallback.
  - node_modules/node-pty/**
  # The `pi-afm` Swift helper (Apple Foundation Models bridge) is a mach-o binary
  # spawned by both the main process (`--check`) and the pi child (streamAfm).
  # A mach-o cannot be exec'd from inside the asar (the fs shim covers reads, not
  # execve), so unpack the whole @pi-desktop/afm package to real disk; afm-main.ts
  # rewrites the resolved app.asar path → app.asar.unpacked so `spawn` finds it.
  - node_modules/@pi-desktop/afm/**
  # The `pi-mac` Swift helper (Mac computer-use: indexed AX-tree snapshot +
  # CGEvent click/type/key/scroll) is likewise a mach-o that main spawns
  # (`pi-mac --serve`), so the whole @pi-desktop/pi-mac package is unpacked to
  # real disk; mac-agent.ts rewrites the resolved app.asar path →
  # app.asar.unpacked so `spawn` finds it. Spawning from main (not the pi child)
  # is what binds the Accessibility + Screen-Recording TCC grants to the signed
  # Bobble.app bundle.
  - node_modules/@pi-desktop/pi-mac/**
  # The gen3d 3D-engine sidecar is a uv/Python program (packages/gen3d-engine,
  # rides along as a `dependencies` entry). uv + python cannot exec server.py
  # from inside the asar, so unpack the package to real disk; gen3d-main.ts
  # resolves <Resources>/app.asar.unpacked/…/gen3d-engine/python/server.py.
  - node_modules/@pi-desktop/gen3d-engine/**
mac:
  target: dir
  category: public.app-category.developer-tools
  # App icon: the "Pi caret" mark. Regenerate from build/icon.svg with
  # `bash scripts/gen-icon.sh` (produces build/icon.icns + build/icon.png).
  # `build/` is electron-builder's default buildResources dir, so icon.icns
  # would be auto-detected, but the path is pinned here to be explicit.
  icon: build/icon.icns
  # No Developer ID yet: skip signing here; ship:local ad-hoc signs after.
  identity: null
