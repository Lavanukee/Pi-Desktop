<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head><title>example domain at DuckDuckGo</title></head>
<body>
<!--
  Captured from the CURRENT lite.duckduckgo.com/lite/ POST response (2026-07),
  trimmed to two results. The lite endpoint is the resilient fallback: a plain
  table of `a.result-link` anchors (direct hrefs, single-quoted class attrs) with
  the snippet in a following row's `td.result-snippet` cell.
-->
<form>
  <input name="q" value="example domain" />
</form>
<table border="0">
  <tr>
    <td valign="top">1.&nbsp;</td>
    <td>
      <a rel="nofollow" href="https://www.example.com/" class='result-link'>Example Domain</a>
    </td>
  </tr>
  <tr>
    <td>&nbsp;&nbsp;&nbsp;</td>
    <td class='result-snippet'>
      This <b>domain</b> is for use in illustrative examples in documents.
    </td>
  </tr>
  <tr>
    <td>&nbsp;&nbsp;&nbsp;</td>
    <td><span class='link-text'>www.example.com</span></td>
  </tr>
  <tr><td>&nbsp;</td><td>&nbsp;</td></tr>

  <tr>
    <td valign="top">2.&nbsp;</td>
    <td>
      <a rel="nofollow" href="https://en.wikipedia.org/wiki/Example.com" class='result-link'>example.com - Wikipedia</a>
    </td>
  </tr>
  <tr>
    <td>&nbsp;&nbsp;&nbsp;</td>
    <td class='result-snippet'>
      The domain names <b>example.com</b>, example.net and example.org are reserved by the IANA.
    </td>
  </tr>
  <tr>
    <td>&nbsp;&nbsp;&nbsp;</td>
    <td><span class='link-text'>en.wikipedia.org/wiki/Example.com</span></td>
  </tr>
</table>
</body>
</html>
