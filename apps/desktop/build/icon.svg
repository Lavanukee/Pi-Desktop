<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Bobble">
  <title>Bobble</title>
  <!--
    Bobble app icon — "the dart".
    A white-outlined cursor-dart filled with the brand blue→purple gradient,
    floating on a near-black tile (jedd's reference mark). The gradient lives
    ONLY here and on the agent cursor — never in the UI chrome (the bobble
    theme flavor is deliberately neutral/frosted).
    Full-bleed 824/1024 macOS safe-area squircle; carries its own background so
    it reads on any light or dark dock wallpaper.
  -->
  <defs>
    <linearGradient id="bb-tile" x1="512" y1="100" x2="512" y2="924" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17171c"/>
      <stop offset="0.55" stop-color="#0e0e13"/>
      <stop offset="1" stop-color="#0a0a0e"/>
    </linearGradient>
    <radialGradient id="bb-sheen" cx="512" cy="220" r="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Coordinates are in the dart's LOCAL space (it renders inside a
         translate(512 512) group), spanning its -150..208 x / -166..166 y box. -->
    <linearGradient id="bb-dart" x1="-140" y1="-150" x2="150" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f8dff"/>
      <stop offset="0.45" stop-color="#5f63f7"/>
      <stop offset="1" stop-color="#7b3ff2"/>
    </linearGradient>
    <clipPath id="bb-squircle">
      <rect x="100" y="100" width="824" height="824" rx="184" ry="184"/>
    </clipPath>
    <!-- soft blue-violet glow behind the dart -->
    <filter id="bb-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="28" flood-color="#5f63f7" flood-opacity="0.4"/>
    </filter>
    <filter id="bb-drop" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g clip-path="url(#bb-squircle)">
    <rect x="100" y="100" width="824" height="824" fill="url(#bb-tile)"/>
    <rect x="100" y="100" width="824" height="824" fill="url(#bb-sheen)"/>
  </g>
  <!-- hairline ring so the dark tile separates from dark docks -->
  <rect x="103" y="103" width="818" height="818" rx="181" ry="181" fill="none"
        stroke="#ffffff" stroke-opacity="0.10" stroke-width="6"/>

  <!--
    The dart: a cursor-arrow pointing right with a notched tail, tilted a touch
    for life. Rounded joins come from the fat round-join white stroke painted
    UNDER the gradient fill (paint-order), matching the reference mark.
  -->
  <g transform="translate(512 512) rotate(-10)" filter="url(#bb-drop)">
    <g filter="url(#bb-glow)">
      <path d="M 208 0 L -150 -166 L -76 0 L -150 166 Z"
            fill="url(#bb-dart)"
            stroke="#ffffff" stroke-width="58"
            stroke-linejoin="round" paint-order="stroke fill"/>
    </g>
    <!-- re-assert the gradient over the glow pass so the fill stays crisp -->
    <path d="M 208 0 L -150 -166 L -76 0 L -150 166 Z"
          fill="url(#bb-dart)"
          stroke="#ffffff" stroke-width="58"
          stroke-linejoin="round" paint-order="stroke fill"/>
  </g>
</svg>
