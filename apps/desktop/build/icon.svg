<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Pi Desktop">
  <title>Pi Desktop</title>
  <!--
    Pi Desktop app icon — "the Pi caret".
    A confident rounded pi (the "pi" agent engine) whose right leg doubles as a
    blinking text-insertion caret in the matching loader (build/loader.svg).
    Warm clay squircle (theme token pd-accent-primary #d97757), cream glyph.
    Full-bleed 824/1024 macOS safe-area squircle; carries its own background so
    it reads on any light or dark dock wallpaper.
  -->
  <defs>
    <linearGradient id="pd-tile" x1="512" y1="100" x2="512" y2="924" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EA8E67"/>
      <stop offset="0.52" stop-color="#D97757"/>
      <stop offset="1" stop-color="#C25E3C"/>
    </linearGradient>
    <radialGradient id="pd-gloss" cx="512" cy="196" r="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pd-vignette" x1="512" y1="540" x2="512" y2="924" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3a1206" stop-opacity="0"/>
      <stop offset="1" stop-color="#3a1206" stop-opacity="0.16"/>
    </linearGradient>
    <clipPath id="pd-squircle">
      <rect x="100" y="100" width="824" height="824" rx="184" ry="184"/>
    </clipPath>
    <filter id="pd-glyph-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#7a2f14" flood-opacity="0.26"/>
    </filter>
  </defs>

  <!-- Clay tile with lit-from-above gloss + grounding vignette -->
  <g clip-path="url(#pd-squircle)">
    <rect x="100" y="100" width="824" height="824" fill="url(#pd-tile)"/>
    <rect x="100" y="100" width="824" height="824" fill="url(#pd-gloss)"/>
    <rect x="100" y="100" width="824" height="824" fill="url(#pd-vignette)"/>
  </g>
  <!-- top inner hairline highlight -->
  <rect x="101" y="101" width="822" height="822" rx="183" ry="183" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Pi glyph (roof + two legs); right leg is the caret the loader blinks -->
  <g fill="#FBF7F0" filter="url(#pd-glyph-shadow)">
    <rect x="300" y="328" width="424" height="86" rx="43"/>
    <rect x="329" y="328" width="86" height="372" rx="43"/>
    <rect x="609" y="328" width="86" height="372" rx="43"/>
  </g>
</svg>
