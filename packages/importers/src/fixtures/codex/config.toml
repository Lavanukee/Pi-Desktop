model = "gpt-5.6-luna"
model_reasoning_effort = "low"

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."legacy@openai-bundled"]
enabled = false

[projects."/Users/test/Documents/Codex/project-a"]
trust_level = "trusted"

[projects."/Users/test/Desktop/untrusted"]
trust_level = "unknown"

[mcp_servers.node_repl]
command = "/opt/codex/node_repl"
args = []

[mcp_servers.node_repl.env]
CODEX_HOME = "/Users/test/.codex"

[mcp_servers.computer-use]
command = "./SkyComputerUseClient"
args = ["mcp"]
enabled = false
