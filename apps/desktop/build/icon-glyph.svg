<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Pi Desktop mark">
  <title>Pi Desktop — glyph</title>
  <!--
    Bare glyph: the Pi caret mark on transparent, in the product clay accent
