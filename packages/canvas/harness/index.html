<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pi Desktop Canvas</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
      }
    </style>
    <!--
      Loaded by the app's pd-preview:// protocol handler as
      pd-preview://canvas/index.html. `harness.js` is the esbuild-bundled runtime
      (morphdom inlined) generated by `scripts/build-harness.mjs`; the same
      handler must serve pd-preview://canvas/harness.js. `defer` guarantees
      <body> exists before startHarness() mounts patched content into it.
    -->
    <script src="./harness.js" defer></script>
  </head>
  <body></body>
</html>
